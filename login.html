<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO Board - Login</title>

    <link rel="canonical" href="https://mosambiswas.com/To-Do/login.html" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon.png" />
    <meta name="theme-color" content="#0a0a0b" />

    <meta name="description" content="Sign in to your TO-DO board. Use username/password or Google Sign-In." />
    <meta name="keywords" content="To-Do, Kanban, login, Google Sign-In, Mosam Biswas" />
    <meta name="author" content="Mosam Biswas" />
    <meta name="robots" content="index, follow" />

    <meta property="og:title" content="TO-DO Board - Login" />
    <meta property="og:description" content="Sign in to access your cloud-synced Kanban board." />
    <meta property="og:image" content="https://mosambiswas.com/To-Do/favicon.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mosambiswas.com/To-Do/login.html" />
    <meta property="og:site_name" content="TO-DO Board" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="TO-DO Board - Login" />
    <meta name="twitter:description" content="Sign in to access your cloud-synced Kanban board." />
    <meta name="twitter:image" content="https://mosambiswas.com/To-Do/favicon.png" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .login-container {
            position: relative;
            background: rgba(17, 17, 19, 0.85);
            backdrop-filter: blur(14px);
            border: 1px solid var(--line-strong);
            padding: 44px 40px;
            border-radius: var(--radius-lg);
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.55);
            width: 100%;
            max-width: 420px;
        }

        .backend-status {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--ink-faint);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.05);
            cursor: help;
        }

        .backend-status.online {
            background: var(--c-done);
            box-shadow: 0 0 10px var(--c-done);
        }

        .backend-status.offline {
            background: var(--c-danger);
            box-shadow: 0 0 10px var(--c-danger);
        }

        .backend-status.checking {
            background: var(--c-in-progress);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            color: var(--ink);
            margin: 0;
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .login-header .check-icon {
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            color: var(--ink-faint);
            margin-bottom: 8px;
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        input {
            width: 100%;
            padding: 13px 14px;
            background: var(--surface-2);
            border: 1px solid var(--line-strong);
            border-radius: var(--radius-sm);
            color: var(--ink);
            font-size: 0.92rem;
            font-family: var(--font-body);
            box-sizing: border-box;
            transition: border-color 0.25s var(--ease), background 0.25s var(--ease);
        }

        input::placeholder {
            color: var(--ink-faint);
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--surface-3);
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 26px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 22px 0;
            color: var(--ink-faint);
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.2em;
        }

        .divider::before,
        .divider::after {
            content: '';
            height: 1px;
            background: var(--line);
            flex: 1;
        }

        .google-wrap {
            display: flex;
            justify-content: center;
        }

        .google-hint {
            margin-top: 10px;
            text-align: center;
            color: var(--ink-faint);
            font-size: 0.75rem;
            line-height: 1.5;
        }

        .form-buttons button {
            flex: 1;
            padding: 13px;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.82rem;
            font-family: var(--font-body);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: all 0.25s var(--ease);
        }

        .login-btn {
            background: var(--accent);
            color: var(--accent-ink);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(216, 255, 62, 0.3);
        }

        .register-btn {
            background: var(--accent);
            color: var(--accent-ink);
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(216, 255, 62, 0.3);
        }

        .error {
            color: var(--c-danger);
            font-size: 0.78rem;
            margin-top: 6px;
        }

        .success {
            color: var(--c-done);
            font-size: 0.78rem;
            margin-top: 6px;
        }

        .toggle-form {
            text-align: center;
            margin-top: 22px;
            color: var(--ink-dim);
            font-size: 0.88rem;
        }

        .toggle-form a {
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-form a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div id="backendStatus" class="backend-status checking" role="status" aria-live="polite" aria-label="Backend status: checking" title="Backend status: checking"></div>
        <div class="login-header">
            <h1>
                <span class="check-icon">✓</span>
                <span>TO-DO</span>
            </h1>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label for="loginUsername">Username</label>
                <input type="text" id="loginUsername" placeholder="Enter your username">
                <div class="error" id="loginUsernameError"></div>
            </div>

            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password">
                <div class="error" id="loginPasswordError"></div>
            </div>

            <div id="loginMessage"></div>

            <div class="google-hint" id="apiHint" style="display:none;"></div>

            <div class="form-buttons">
                <button class="login-btn" onclick="login()">Login</button>
            </div>

            <div class="divider">OR</div>
            <div class="google-wrap">
                <div id="googleSignInButton"></div>
            </div>
            <div class="google-hint" id="googleHint" style="display:none;">
                Google sign-in needs a configured Client ID and a hosted origin (use `http://localhost:8000`, not `file:///`).
            </div>

            <div class="toggle-form">
                Don't have an account? <a onclick="toggleForms()">Register</a>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" style="display: none;">
            <div class="form-group">
                <label for="registerUsername">Username</label>
                <input type="text" id="registerUsername" placeholder="Choose a username">
                <div class="error" id="registerUsernameError"></div>
            </div>

            <div class="form-group">
                <label for="registerEmail">Email</label>
                <input type="email" id="registerEmail" placeholder="Enter your email">
                <div class="error" id="registerEmailError"></div>
            </div>

            <div class="form-group">
                <label for="registerPassword">Password</label>
                <input type="password" id="registerPassword" placeholder="Create a password (min 6 chars)">
                <div class="error" id="registerPasswordError"></div>
            </div>

            <div id="registerMessage"></div>

            <div class="form-buttons">
                <button class="register-btn" onclick="register()">Register</button>
            </div>

            <div class="toggle-form">
                Already have an account? <a onclick="toggleForms()">Login</a>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const API_URL = window.TODO_API_URL || 'http://localhost:5000/api';
        const GOOGLE_CLIENT_ID = '367094542116-2hcm8562n7k56esnnp362c3h2igc95c0.apps.googleusercontent.com';
        const DEBUG_UI = new URLSearchParams(window.location.search).get('debug') === '1' || window.TODO_DEBUG === true;

        function toggleForms() {
            document.getElementById('loginForm').style.display = 
                document.getElementById('loginForm').style.display === 'none' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = 
                document.getElementById('registerForm').style.display === 'none' ? 'block' : 'none';
            clearErrors();
        }

        function clearErrors() {
            document.querySelectorAll('.error').forEach(el => el.textContent = '');
            document.querySelectorAll('[id$="Message"]').forEach(el => el.textContent = '');
        }

        async function login() {
            clearErrors();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!username) {
                document.getElementById('loginUsernameError').textContent = 'Username required';
                return;
            }
            if (!password) {
                document.getElementById('loginPasswordError').textContent = 'Password required';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    document.getElementById('loginMessage').innerHTML = 
                        `<div class="error">${data.message}</div>`;
                    return;
                }

                // Save token and user info
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                // Redirect to board
                window.location.href = 'board.html';
            } catch (err) {
                const apiHint = document.getElementById('apiHint');
                if (DEBUG_UI && apiHint) {
                    apiHint.style.display = 'block';
                    apiHint.textContent = `API: ${API_URL}`;
                }
                document.getElementById('loginMessage').innerHTML = 
                    `<div class="error">Connection error: ${err.message}${err.message === 'Failed to fetch' ? '<br/>Tip: check if your network/Private DNS/adblock blocks onrender.com. Try opening /api/health directly.' : ''}</div>`;
            }
        }

        async function handleGoogleCredential(credential) {
            try {
                const response = await fetch(`${API_URL}/auth/google`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential })
                });

                const data = await response.json();

                if (!response.ok) {
                    document.getElementById('loginMessage').innerHTML =
                        `<div class="error">${data.message || 'Google login failed'}</div>`;
                    return;
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                // Mark as new user for tutorial if this is a new registration via Google
                if (data.isNewUser) {
                    localStorage.setItem('isNewUser', 'true');
                }
                
                window.location.href = 'board.html';
            } catch (err) {
                const apiHint = document.getElementById('apiHint');
                if (DEBUG_UI && apiHint) {
                    apiHint.style.display = 'block';
                    apiHint.textContent = `API: ${API_URL}`;
                }
                document.getElementById('loginMessage').innerHTML =
                    `<div class="error">Connection error: ${err.message}${err.message === 'Failed to fetch' ? '<br/>Tip: check if your network/Private DNS/adblock blocks onrender.com. Try opening /api/health directly.' : ''}</div>`;
            }
        }

        async function testBackendConnection() {
            const statusEl = document.getElementById('backendStatus');
            const msg = document.getElementById('loginMessage');

            // Don't show verbose health-check text in the UI; keep it on hover.
            if (msg) msg.innerHTML = '';

            if (statusEl) {
                statusEl.classList.remove('online', 'offline');
                statusEl.classList.add('checking');
                statusEl.setAttribute('aria-label', 'Backend status: checking');
                statusEl.setAttribute('title', `Backend status: checking\nAPI: ${API_URL}`);
            }
            const apiHint = document.getElementById('apiHint');
            if (apiHint) apiHint.style.display = 'none';

            // If config.js didn't load on a deployed site, API_URL falls back to localhost.
            // That will always fail on mobile/production, so show a clear hint.
            if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
                if (String(API_URL).includes('http://localhost:5000')) {
                    if (statusEl) {
                        statusEl.classList.remove('checking', 'online');
                        statusEl.classList.add('offline');
                        const tip = 'Config error: API is set to localhost. Use https://mosambiswas.com/To-Do/login.html (not a different path) and hard refresh so config.js loads.';
                        statusEl.setAttribute('aria-label', tip);
                        statusEl.setAttribute('title', `${tip}\nAPI: ${API_URL}`);
                    }
                    return;
                }
            }
            try {
                const res = await fetch(`${API_URL}/health`, { method: 'GET' });
                const text = await res.text();
                if (!res.ok) {
                    if (statusEl) {
                        statusEl.classList.remove('checking', 'online');
                        statusEl.classList.add('offline');
                        const tip = `Backend offline: health check failed (${res.status}).`;
                        statusEl.setAttribute('aria-label', tip);
                        statusEl.setAttribute('title', `${tip}\nAPI: ${API_URL}`);
                    }
                    return;
                }
                if (statusEl) {
                    statusEl.classList.remove('checking', 'offline');
                    statusEl.classList.add('online');
                    const tip = `Backend reachable: ${text}`;
                    statusEl.setAttribute('aria-label', tip);
                    statusEl.setAttribute('title', `${tip}\nAPI: ${API_URL}`);
                }
            } catch (err) {
                if (statusEl) {
                    statusEl.classList.remove('checking', 'online');
                    statusEl.classList.add('offline');
                    const tip = `Backend offline: ${err.message}`;
                    statusEl.setAttribute('aria-label', tip);
                    statusEl.setAttribute('title', `${tip}\nAPI: ${API_URL}`);
                }
            }
        }

        function initGoogleSignIn() {
            const hint = document.getElementById('googleHint');
            const isPlaceholder = !GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID.startsWith('YOUR_GOOGLE_CLIENT_ID');

            if (isPlaceholder) {
                hint.style.display = 'block';
                return;
            }

            if (!window.google || !google.accounts || !google.accounts.id) {
                // GIS script not ready yet
                return;
            }

            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: (response) => {
                    if (response && response.credential) {
                        handleGoogleCredential(response.credential);
                    }
                }
            });

            const buttonEl = document.getElementById('googleSignInButton');
            if (buttonEl) {
                google.accounts.id.renderButton(buttonEl, {
                    theme: 'outline',
                    size: 'large',
                    text: 'continue_with',
                    shape: 'rectangular',
                    width: 320
                });
            }
        }

        async function register() {
            clearErrors();
            const username = document.getElementById('registerUsername').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value.trim();

            let hasError = false;

            if (!username) {
                document.getElementById('registerUsernameError').textContent = 'Username required';
                hasError = true;
            }
            if (!email) {
                document.getElementById('registerEmailError').textContent = 'Email required';
                hasError = true;
            }
            if (!password || password.length < 6) {
                document.getElementById('registerPasswordError').textContent = 'Password must be at least 6 characters';
                hasError = true;
            }

            if (hasError) return;

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    document.getElementById('registerMessage').innerHTML = 
                        `<div class="error">${data.message}</div>`;
                    return;
                }

                // Save token and user info
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                // Mark as new user for tutorial
                localStorage.setItem('isNewUser', 'true');

                // Redirect to board
                window.location.href = 'board.html';
            } catch (err) {
                const apiHint = document.getElementById('apiHint');
                if (DEBUG_UI && apiHint) {
                    apiHint.style.display = 'block';
                    apiHint.textContent = `API: ${API_URL}`;
                }
                document.getElementById('registerMessage').innerHTML = 
                    `<div class="error">Connection error: ${err.message}</div>`;
            }
        }

        // Allow Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (document.getElementById('loginForm').style.display !== 'none') {
                    login();
                } else {
                    register();
                }
            }
        });

        // Initialize Google Sign-In after GIS loads
        document.addEventListener('DOMContentLoaded', () => {
            // Quick connection check helps debug mobile/network issues
            testBackendConnection();
            const retry = () => {
                initGoogleSignIn();
                if (!window.google || !google.accounts || !google.accounts.id) {
                    setTimeout(retry, 100);
                }
            };
            retry();
        });
    </script>

    <!-- Google Identity Services (Sign in with Google) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
